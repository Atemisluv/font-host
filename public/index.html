<html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字体托管</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-weight: 500;
    }
    .upload-area {
      background: white;
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #666; }
    .upload-area.dragover { border-color: #333; background: #fafafa; }
    .upload-area input[type="file"] { display: none; }
    .upload-btn {
      background: #333;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .upload-btn:hover { background: #555; }

    /* 上传进度 */
    .upload-progress {
      margin-top: 20px;
      display: none;
    }
    .upload-progress.show { display: block; }
    .progress-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #333;
      width: 0%;
      transition: width 0.1s;
    }

    .font-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .font-item {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }
    .font-item:last-child { border-bottom: none; }
    .font-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .font-info { flex: 1; }
    .font-name {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }
    .font-size {
      font-size: 13px;
      color: #999;
    }
    .font-actions { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-copy { background: #e8f4e8; color: #2d7d2d; }
    .btn-delete { background: #fbe8e8; color: #c53030; }
    .btn:hover { opacity: 0.8; }

    /* 字体预览 */
    .font-preview {
      padding: 12px 16px;
      background: #f9f9f9;
      border-radius: 6px;
      font-size: 16px;
      color: #333;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      display: none;
      z-index: 1000;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>字体托管服务</h1>

    <div class="upload-area" id="uploadArea">
      <p style="margin-bottom: 15px; color: #666;">点击或拖拽上传字体文件</p>
      <p style="font-size: 13px; color: #999; margin-bottom: 20px;">支持 .ttf .otf .woff .woff2</p>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
      <input type="file" id="fileInput" accept=".ttf,.otf,.woff,.woff2" multiple>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-info" id="progressInfo">上传中...</div>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <div class="font-list" id="fontList">
      <div class="empty">暂无字体</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    const PREVIEW_TEXT = '你好 123 Hello オハよ 안녕하세요';
    let fontCounter = 0; // 用于生成唯一的font-family名称

    // 显示提示
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // 加载字体列表
    async function loadFonts() {
      const res = await fetch(API_BASE + '/api/fonts');
      const fonts = await res.json();
      const list = document.getElementById('fontList');

      if (fonts.length === 0) {
        list.innerHTML = '<div class="empty">暂无字体</div>';
        return;
      }

      list.innerHTML = fonts.map(f => {
        const fontId = 'font-' + (++fontCounter);
        const fullUrl = window.location.origin + f.url;

        return `
          <div class="font-item">
            <style>
              @font-face {
                font-family: '${fontId}';
                src: url('${f.url}') format('truetype');
                font-display: swap;
              }
            </style>
            <div class="font-header">
              <div class="font-info">
                <div class="font-name">${f.name}</div>
                <div class="font-size">${formatSize(f.size)}</div>
              </div>
              <div class="font-actions">
                <button class="btn btn-copy" onclick="copyLink('${fullUrl}')">复制链接</button>
                <button class="btn btn-delete" onclick="deleteFont('${encodeURIComponent(f.name)}')">删除</button>
              </div>
            </div>
            <div class="font-preview" style="font-family: '${fontId}', sans-serif;">${PREVIEW_TEXT}</div>
          </div>
        `;
      }).join('');
    }

    // 复制链接
    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        showToast('链接已复制');
      });
    }

    // 删除字体
    async function deleteFont(name) {
      if (!confirm('确定删除这个字体吗？')) return;
      await fetch(API_BASE + '/api/fonts/' + name, { method: 'DELETE' });
      showToast('已删除');
      loadFonts();
    }

    // 上传文件（带进度）
    function uploadFile(file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('font', file);

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            resolve(JSON.parse(xhr.responseText));
          } else {
            reject(new Error('上传失败'));
          }
        });

        xhr.addEventListener('error', () => reject(new Error('网络错误')));

        xhr.open('POST', API_BASE + '/api/upload');
        xhr.send(formData);
      });
    }

    // 处理多文件上传
    async function handleUpload(files) {
      if (files.length === 0) return;

      const progressDiv = document.getElementById('uploadProgress');
      const progressInfo = document.getElementById('progressInfo');
      const progressBar = document.getElementById('progressBar');

      progressDiv.classList.add('show');

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        progressInfo.textContent = `上传中 (${i + 1}/${files.length}): ${file.name}`;
        progressBar.style.width = '0%';

        try {
          await uploadFile(file);
        } catch (err) {
          showToast(`${file.name} 上传失败`);
        }
      }

      progressDiv.classList.remove('show');
      progressBar.style.width = '0%';
      showToast('上传完成');
      loadFonts();
    }

    // 文件选择
    document.getElementById('fileInput').addEventListener('change', (e) => {
      handleUpload(e.target.files);
      e.target.value = '';
    });

    // 拖拽上传
    const uploadArea = document.getElementById('uploadArea');

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f =>
        ['.ttf', '.otf', '.woff', '.woff2'].some(ext => f.name.toLowerCase().endsWith(ext))
      );
      if (files.length > 0) {
        handleUpload(files);
      } else {
        showToast('请上传字体文件');
      }
    });

    // 初始加载
    loadFonts();
  </script>
</body>
</html>
