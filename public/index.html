<html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字体托管</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-weight: 500;
    }
    .upload-area {
      background: white;
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-bottom: 30px;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #666; }
    .upload-area input[type="file"] { display: none; }
    .upload-btn {
      background: #333;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    .upload-btn:hover { background: #555; }

    /* 进度条样式 */
    .progress-container {
      margin-top: 20px;
      display: none;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #333;
      width: 0%;
      transition: width 0.2s;
    }
    .progress-text {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }

    .font-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .font-item {
      padding: 20px;
      border-bottom: 1px solid #eee;
    }
    .font-item:last-child { border-bottom: none; }
    .font-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .font-info { flex: 1; }
    .font-name {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }
    .font-size {
      font-size: 13px;
      color: #999;
    }
    .font-actions { display: flex; gap: 10px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-copy { background: #e8f4e8; color: #2d7d2d; }
    .btn-delete { background: #fbe8e8; color: #c53030; }
    .btn:hover { opacity: 0.8; }

    /* 预览样式 */
    .font-preview {
      padding: 16px;
      background: #fafafa;
      border-radius: 8px;
      font-size: 24px;
      line-height: 1.6;
      color: #333;
      word-break: break-all;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>字体托管服务</h1>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p style="margin-bottom: 15px; color: #666;">点击或拖拽上传字体文件</p>
      <p style="font-size: 13px; color: #999; margin-bottom: 20px;">支持 .ttf .otf .woff .woff2</p>
      <button class="upload-btn">选择文件</button>
      <input type="file" id="fileInput" accept=".ttf,.otf,.woff,.woff2" multiple>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">上传中... 0%</div>
      </div>
    </div>

    <div class="font-list" id="fontList">
      <div class="empty">暂无字体</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    const PREVIEW_TEXT = '你好 123 Hello オハよ 안녕하세요';
    let fontCounter = 0;

    // 显示提示
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 格式化文件大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // 加载字体列表
    async function loadFonts() {
      const res = await fetch(API_BASE + '/api/fonts');
      const fonts = await res.json();
      const list = document.getElementById('fontList');

      if (fonts.length === 0) {
        list.innerHTML = '<div class="empty">暂无字体</div>';
        return;
      }

      list.innerHTML = fonts.map((f, index) => {
        const fontFamilyName = `preview-font-${index}`;
        const fullUrl = window.location.origin + f.url;

        return `
          <style>
            @font-face {
              font-family: '${fontFamilyName}';
              src: url('${fullUrl}');
              font-display: swap;
            }
          </style>
          <div class="font-item">
            <div class="font-header">
              <div class="font-info">
                <div class="font-name">${f.name}</div>
                <div class="font-size">${formatSize(f.size)}</div>
              </div>
              <div class="font-actions">
                <button class="btn btn-copy" onclick="copyLink('${f.url}')">复制链接</button>
                <button class="btn btn-delete" onclick="deleteFont('${encodeURIComponent(f.name)}')">删除</button>
              </div>
            </div>
            <div class="font-preview" style="font-family: '${fontFamilyName}', sans-serif;">
              ${PREVIEW_TEXT}
            </div>
          </div>
        `;
      }).join('');
    }

    // 复制链接
    function copyLink(url) {
      const fullUrl = window.location.origin + url;
      navigator.clipboard.writeText(fullUrl).then(() => {
        showToast('链接已复制');
      });
    }

    // 删除字体
    async function deleteFont(name) {
      if (!confirm('确定删除这个字体吗？')) return;
      await fetch(API_BASE + '/api/fonts/' + name, { method: 'DELETE' });
      showToast('已删除');
      loadFonts();
    }

    // 上传处理（带进度）
    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const files = e.target.files;
      if (files.length === 0) return;

      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');

      progressContainer.style.display = 'block';

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const formData = new FormData();
        formData.append('font', file);

        await new Promise((resolve) => {
          const xhr = new XMLHttpRequest();

          xhr.upload.addEventListener('progress', (event) => {
            if (event.lengthComputable) {
              const percent = Math.round((event.loaded / event.total) * 100);
              progressFill.style.width = percent + '%';
              progressText.textContent = `上传中 (${i + 1}/${files.length}): ${file.name} - ${percent}%`;
            }
          });

          xhr.addEventListener('load', () => {
            resolve();
          });

          xhr.addEventListener('error', () => {
            showToast('上传失败: ' + file.name);
            resolve();
          });

          xhr.open('POST', API_BASE + '/api/upload');
          xhr.send(formData);
        });
      }

      progressContainer.style.display = 'none';
      progressFill.style.width = '0%';
      showToast('上传完成');
      loadFonts();
      e.target.value = '';
    });

    // 初始加载
    loadFonts();
  </script>
</body>
</html>
